<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>modalsynth — Material Editor</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="topbar-title">modalsynth · Material Editor</div>
      <div id="status" class="status">Initializing…</div>
    </header>
    <main id="main-content">
      <section id="left-pane" class="panel">
        <div class="panel-section">
          <h3>Presets — Material A</h3>
          <div id="preset-A"></div>
        </div>
        <div class="panel-section">
          <h3>Material A parameters</h3>
          <div id="param-A"></div>
        </div>
      </section>

      <section id="center-pane" class="panel">
        <div class="panel-section">
          <h3>Contact simulation</h3>
          <div id="contact-controls"></div>
        </div>
        <div class="panel-section">
          <h3>Cross-damping (α)</h3>
          <div id="alpha-control"></div>
        </div>
      </section>

      <section id="right-pane" class="panel">
        <div class="panel-section">
          <h3>Presets — Material B (opposing)</h3>
          <div id="preset-B"></div>
        </div>
        <div class="panel-section">
          <h3>Material B parameters</h3>
          <div id="param-B"></div>
        </div>
      </section>
    </main>
    <footer id="status-bar">
      <span id="footer-msg">Waiting for Faust…</span>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
